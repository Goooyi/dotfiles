# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
# palette = "catppuccin_macchiato"

# Insert a horizontal line between directory info and the prompt character
format = """
$all\
$fill\
$line_break\
$character"""
add_newline = false

[fill]
symbol = "─"
style = "dimmed"

# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[⚡](bold green) ❯](bold green)"
error_symbol = "[[⚡](bold red) ❯](bold red)"
vimcmd_symbol = "[⚡ ❮](bold green)" # For use with zsh-vi-mode

[git_branch]
style = "bold bright-magenta"

[directory]
truncation_length = 4
style = "bold blue"


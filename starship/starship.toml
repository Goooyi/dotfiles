format = "$directory$git_branch$git_status$python$nodejs$cmd_duration$line_break$character"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = "git:"
style = "bold blue"

[git_status]
style = "bold yellow"

[python]
symbol = "py "
style = "bold green"

[nodejs]
symbol = "node "
style = "bold green"

[cmd_duration]
min_time = 500
style = "dimmed"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
